{% extends "accounts/base.html" %}
{% block content %}

<div class="worker-create-page">

    <h2>Create Worker</h2>

    <form method="post" enctype="multipart/form-data" class="worker-form">
        {% csrf_token %}

        <div class="form-box">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-create">
            Create Worker
        </button>

    </form>

    <a href="{% url 'worker_list' %}" class="btn-back">
        ← Back to Worker List
    </a>

</div>

<style>

/* ================= PAGE CONTAINER ================= */
.worker-create-page{
    max-width: 700px;
    margin: 40px auto;
    padding: 30px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border-radius: 18px;

    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* TITLE */
.worker-create-page h2{
    text-align: center;
    margin-bottom: 20px;
    color: #0f766e;
    font-weight: 600;
}

/* FORM INPUTS */
.form-box input,
.form-box select,
.form-box textarea{
    width: 100%;
    padding: 10px;

    margin-bottom: 12px;

    border-radius: 10px;
    border: none;

    background: rgba(255,255,255,0.85);

    box-sizing: border-box;
}

/* ================= CREATE BUTTON ================= */
.btn-create{
    width: 100%;
    height: 44px;

    margin-top: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 12px;

    font-weight: 700;   /* ✔ bold */
    letter-spacing: 0.5px;
    color: #fff;

    border: 1px solid rgba(255,255,255,0.25);

    background: linear-gradient(
        135deg,
        rgba(16,185,129,0.85),
        rgba(4,120,87,0.85)
    );

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow:
        0 10px 22px rgba(0,0,0,0.25),
        inset 0 1px 1px rgba(255,255,255,0.15);

    transition: 0.3s ease;
    cursor: pointer;
}

/* HOVER */
.btn-create:hover{
    transform: translateY(-3px);
    box-shadow:
        0 16px 35px rgba(0,0,0,0.30),
        0 0 18px rgba(16,185,129,0.25);
}

/* ================= BACK BUTTON (MATCH STYLE) ================= */
.btn-back{
    display: flex;
    align-items: center;
    justify-content: center;

    width: 100%;
    height: 44px;

    margin-top: 15px;

    border-radius: 12px;

    text-decoration: none;
    font-weight: 500;
    color: #fff;

    background: linear-gradient(
        135deg,
        rgba(30,58,138,0.85),
        rgba(67,56,202,0.85)
    );

    border: 1px solid rgba(255,255,255,0.25);

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow:
        0 8px 18px rgba(0,0,0,0.18),
        inset 0 1px 1px rgba(255,255,255,0.15);

    transition: 0.3s ease;
}

/* BACK HOVER */
.btn-back:hover{
    transform: translateY(-3px);
    box-shadow:
        0 14px 30px rgba(0,0,0,0.28),
        inset 0 1px 1px rgba(255,255,255,0.2);
}

</style>

{% endblock %}
