{% extends 'accounts/base.html' %}
{% block content %}

<div class="delete-page">

    <h2>Delete Worker: {{ user.first_name }} {{ user.last_name }}</h2>

    <p class="info">Email: {{ user.email }}</p>

    <form method="post" class="delete-form">
        {% csrf_token %}

        <label for="reason">Reason for deletion:</label>

        <textarea name="reason" id="reason" rows="4"
                  placeholder="Enter reason..." required></textarea>

        <!-- BUTTONS -->
        <div class="btn-group">

            <button type="submit" class="btn-delete">
                Delete Worker
            </button>

            <a href="{% url 'worker_list' %}" class="btn-cancel">
                Cancel
            </a>

        </div>

    </form>

</div>

<style>

/* ================= PAGE ================= */
.delete-page{
    max-width: 600px;
    margin: 40px auto;
    padding: 25px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border-radius: 18px;

    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* TITLE */
.delete-page h2{
    text-align: center;
    margin-bottom: 15px;
    color: #0f766e;
    font-weight: 600;
}

/* INFO */
.info{
    text-align: center;
    margin-bottom: 15px;
    color: #334155;
}

/* TEXTAREA */
.delete-form textarea{
    width: 100%;
    padding: 10px;

    border-radius: 10px;
    border: none;

    background: rgba(255,255,255,0.85);

    margin-top: 8px;
    box-sizing: border-box;
}

/* ================= BUTTON ROW ================= */
.btn-group{
    display: flex;
    gap: 12px;
    margin-top: 15px;

    align-items: stretch; /* IMPORTANT */
}

/* ================= BASE BUTTON (FOR BOTH) ================= */
.btn-delete,
.btn-cancel{
    flex: 1;

    display: inline-flex;   /* KEY FIX */
    align-items: center;
    justify-content: center;

    height: 44px;           /* SAME HEIGHT */

    padding: 0;             /* REMOVE INCONSISTENCY */
    margin: 0;

    box-sizing: border-box;

    border-radius: 12px;

    font-weight: 500;
    color: #fff;
    text-decoration: none;

    border: 1px solid rgba(255,255,255,0.25);

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow:
        0 8px 18px rgba(0,0,0,0.18),
        inset 0 1px 1px rgba(255,255,255,0.15);

    transition: 0.3s ease;
    cursor: pointer;
}

/* ================= DELETE (RED GLASS) ================= */
.btn-delete{
    background: linear-gradient(
        135deg,
        rgba(239,68,68,0.75),
        rgba(185,28,28,0.75)
    );
    border: none;
}

/* ================= CANCEL (NAVY GLASS) ================= */
.btn-cancel{
    background: linear-gradient(
        135deg,
        rgba(30,58,138,0.75),
        rgba(67,56,202,0.75)
    );
}

/* ================= HOVER ================= */
.btn-delete:hover,
.btn-cancel:hover{
    transform: translateY(-3px);
    box-shadow:
        0 14px 30px rgba(0,0,0,0.28),
        inset 0 1px 1px rgba(255,255,255,0.2);
}

</style>

{% endblock %}
